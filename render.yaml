services:
  - type: web
    name: youngzip
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    # Render가 $PORT를 Streamlit에 직접 전달
    # Streamlit이 외부 포트 점유 → WebSocket 403 없음
    healthCheckPath: /health  # FastAPI /health는 내부 8000에 있으므로
    # 실제 헬스체크는 Streamlit이 응답하는 / 로 변경 권장
    envVars:
      - key: KAKAO_REST_API_KEY
        sync: false
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      # BASE_URL, FASTAPI_URL, STREAMLIT_URL 모두 불필요
      # RENDER_EXTERNAL_URL은 Render가 자동 주입
